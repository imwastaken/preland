<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Open in Browser</title>

    <script>
        // =================================================================
        // НАСТРОЙКИ (ВНИМАТЕЛЬНО ПРОЧТИТЕ)
        // =================================================================
        
        // 1. Ссылка на ваш настоящий лендинг
        const REAL_LANDING_URL = "https://lockerview.top";

        // 2. РЕЖИМ ТЕСТИРОВАНИЯ
        // Сейчас стоит true — редирект отключен, вы можете смотреть дизайн!
        // ПЕРЕД ЗАПУСКОМ РЕКЛАМЫ ПОМЕНЯЙТЕ НА false
        const TEST_MODE = false; 

        function isInAppBrowser() {
            const ua = (navigator.userAgent || navigator.vendor || window.opera).toLowerCase();
            const inAppMarkers = [
                'tiktok', 'bytedance', 'musical_ly', 
                'snssdk', 'aweme', 'trill', 'jianying', 
                'instagram', 'fbav', 'fban', 'fb_iab', 'vkontakte',
                'telegram', 'tgbot' // <-- Добавили Telegram!
            ];
            return inAppMarkers.some(marker => ua.includes(marker));
        }

        // Защита для предпросмотра (чтобы сайт не ломался в редакторах)
        const isIframe = window.self !== window.top;

        // Если тесты выключены И мы не во фрейме предпросмотра
        if (!TEST_MODE && !isIframe) {
            // И если это обычный браузер (не TikTok)
            if (!isInAppBrowser()) {
                window.location.replace(REAL_LANDING_URL); // Перекидываем на лендинг
            }
        }
    </script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 90%;
            z-index: 10;
        }

        .icon {
            font-size: 56px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            font-size: 16px;
            line-height: 1.5;
            color: #b0b0b0;
            margin-bottom: 30px;
        }

        .steps {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .step {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .step:last-child {
            margin-bottom: 0;
        }

        .step-number {
            background: #fe2c55; 
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .step-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .arrow {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            animation: bounce 0.8s infinite alternate ease-in-out;
            z-index: 20;
        }

        @keyframes bounce {
            0% { transform: translate(0, 0); }
            100% { transform: translate(15px, -15px); }
        }
    </style>
</head>
<body>

    <!-- Векторная стрелка, указывающая на меню -->
    <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="#fe2c55" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="19" x2="19" y2="5"></line>
        <polyline points="9 5 19 5 19 15"></polyline>
    </svg>

    <!-- Основной контент страницы (с ID для локализации) -->
    <div class="container">
        <div class="icon">🚀</div>
        <h1 id="text-title">Almost there!</h1>
        <p id="text-subtitle">To continue, please open this page in your phone's browser.</p>

        <div class="steps">
            <div class="step">
                <div class="step-number">1</div>
                <div class="step-text" id="text-step1">Tap the three dots <strong>in the top right corner</strong>.</div>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-text" id="text-step2">Select <strong>"Open in browser"</strong>.</div>
            </div>
        </div>
    </div>

    <!-- Скрипт локализации по IP -->
    <script>
        const translations = {
            pl: {
                title: "Prawie gotowe!",
                subtitle: "Aby kontynuować, otwórz tę stronę w przeglądarce telefonu.",
                step1: "Stuknij w trzy kropki <strong>w prawym górnym rogu</strong>.",
                step2: "Wybierz <strong>«Otwórz w przeglądarce»</strong> (Open in browser)."
            }
        };

        async function applyLocalization() {
            try {
                // Бесплатный и быстрый API для проверки страны по IP
                const response = await fetch('https://get.geojs.io/v1/ip/country.json');
                const data = await response.json();
                
                // Если страна - Польша, подменяем текст
                if (data.country === 'PL') {
                    document.getElementById('text-title').innerHTML = translations.pl.title;
                    document.getElementById('text-subtitle').innerHTML = translations.pl.subtitle;
                    document.getElementById('text-step1').innerHTML = translations.pl.step1;
                    document.getElementById('text-step2').innerHTML = translations.pl.step2;
                }
            } catch (error) {
                // Если API заблокирован адблоком пользователя, ничего не делаем,
                // страница просто останется на универсальном английском языке.
                console.log("Локализация: оставлен английский по умолчанию.");
            }
        }

        // Запускаем локализацию сразу после загрузки структуры страницы
        document.addEventListener("DOMContentLoaded", applyLocalization);
    </script>

</body>
</html>
